pre-commit:
  jobs:
    - name: check-author
      run: |
        NAME=$(git config user.name)
        if [ "$NAME" != "GrantKlassy" ]; then
          echo "ERROR: git user.name is '$NAME' --- expected 'GrantKlassy'"
          echo "  git config user.name 'GrantKlassy'"
          echo "  git config user.email '28637437+GrantKlassy@users.noreply.github.com'"
          exit 1
        fi
    - name: update-badge
      run: task fix:badge
    - name: env-hygiene
      run: task check:env-hygiene
    - name: gitignore-baseline
      run: task check:gitignore-baseline
    - name: no-emdash
      run: task fix:emdash
    - name: graph-invariants
      run: task local:check:graph-invariants
      glob:
        - "src/genesis/**/*.{ts,astro}"
        - "src/graph/**/*.{ts,astro}"
        - "tests/unit/genesis.test.ts"
        - "tests/unit/graph.test.ts"
        - "tests/unit/highlight.test.ts"
    - name: assets-size
      run: task local:check:assets-size

commit-msg:
  jobs:
    - name: no-coauthor
      run: |
        if grep -qi "co-authored-by" {1}; then
          echo "ERROR: Co-Authored-By trailer detected --- not allowed in grantklassy repos"
          exit 1
        fi

pre-push:
  jobs:
    - name: full-test-and-checks
      # task local:test fans out to: task check (repo standards + typecheck +
      # unit tests) + Playwright e2e across every viewport. ~2 min budget;
      # accepted in exchange for catching e2e regressions before CI / merge.
      run: task local:test
    - name: deploy
      run: |
        if [ "$(git rev-parse --abbrev-ref HEAD)" = "main" ]; then
          task local:deploy || echo "deploy failed --- push proceeding anyway"
        fi
